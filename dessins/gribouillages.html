<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <title>jej - gribouillages</title>
        <link rel="icon" type="image/x-icon" href="../img/jej.png">
        <link href="../css/style.css" rel="stylesheet">
        <link href="../css/dessins-cols.css" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900&display=swap" rel="stylesheet">

    </head>
    <body>
        <a style="font-size: 0.9em"; href="../index.html"> < retour à l'accueil</a>
        <nav id="navbar"></nav>

        <header>
            <a class="lien-titre" href="#">
                <h1>gribouillages depuis 2019</h1>
            </a>
        </header>

        <main>

        <p>en parallèle de mon illustre fonction de président du club dessin, je continuais de ternir les marges de mes cahiers</p>
        <p>en voici quelques échantillons</p>

        <div class="dessins-container">
            <div class="dessins-col"></div>

            <!---------------------------------------------------------->

            <div class="dessins-col">
            </div>
        </div>

        
        <div class="dessins-container-thin">
            <div class="dessins-col">
            </div>
        </div>

        <script>
            const cols = document.querySelectorAll('.dessins-col');
            const files = [
                "2019.09.04",
                "2019.09.05",
                "2020.09.24 (2)",
                "2020.10.08",
                "2020.10.12",
                "2021.03.14 (1)",
                "2021.03.14 (2)",
                "2021.05.26",
                "2021.05.31",
                "2021.09.15", 
                "2021.09.22",
                "2021.09.27 (2)",
                "2022.02.02",
                "2023.05.23",
                "2023.12.09",
                "2024.10.22",
                "2024.12.14",
                "2025.10.17",
                "2025.10.24 (1)",
                "2025.10.24 (2)",
                "2025.10.24 (3)"
            ];

            var b = 0;
            files.forEach((file) => { // "2021.09.27 (2)"
                let filepoint = file.split(' ')[0]; // "2021.09.27"
                let fileslash = filepoint.replaceAll('.', '/'); // "2021/09/27"
                
                let newHTML = `<figure>
                    <a href="../img/gribouilles2019/${file}.jpg">
                        <img src="../img/gribouilles2019/${file}.jpg" title="${filepoint}">
                    </a>
                    <figcaption>${fileslash}</figcaption>
                </figure>
                `
                
                cols[2].innerHTML += newHTML;
                cols[b].innerHTML += newHTML;
                b = 1-b // passe de 0 à 1 et inversement
            })
        </script>
        
        </main>

        <footer id="footer">
            <script type="text/javascript" src="../scripts/js/headerFooter.js"></script>
        </footer>

    </body>
</html>
