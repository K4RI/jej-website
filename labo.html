            <section id="date">
                <!-- https://thaer.no/calendar -->
                <div id="dateText" style="text-align: center; font-weight: bold;"></div>
                <div style="font-size: x-large; font-weight: bolder; text-align: left; transform: translateX(100%); width: 50%;">
                    <div id="horlogeHaut"></div>
                    <span id="heures" style="display: inline-block; transform-origin: left;">--h-->
                        <span id="minutes" style="display: inline-block; transform-origin: left;">---m--->
                            <span id="secondes" style="display: inline-block; transform-origin: left;">----s---->
                                <span id="millisecondes" style="display: inline-block; transform-origin: left;">-----ms-----></span>
                            </span>
                        </span>
                    </span>

                    <div id="horlogeBas"></div>
                    <!-- <span style="display: inline-block; transform: translate(-1em, -5.6em) scale(20);color: gray;font-weight: normal;">○</span> -->
                </div>

                <script>
                    const dateText = document.getElementById("dateText")
                    const horlogeHaut = document.getElementById("horlogeHaut")
                    const horlogeBas = document.getElementById("horlogeBas")
                    const semaine = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche']
                    const heures = document.getElementById("heures")
                    const minutes = document.getElementById("minutes")
                    const secondes = document.getElementById("secondes")
                    const millisecondes = document.getElementById("millisecondes")

                      
                    const heuresW = heures.offsetWidth - minutes.offsetWidth
                    const minutesW = minutes.offsetWidth - secondes.offsetWidth
                    const smsW = secondes.offsetWidth// secondes et millisecondes
                    
                    function fill(str, n){
                        return '0'.repeat(n-str.toString().length) + str
                    }

                    function dateLoop(){
                        let date = new Date(); // date = new Date(0,0,0, 18,30,30,500);
                        let date2 = `${semaine[date.getDay()]} ${fill(date.getDate(),2)}/${fill(date.getMonth(),2)}/${date.getFullYear()}, ${fill(date.getHours(),2)}:${fill(date.getMinutes(),2)}:${fill(date.getSeconds(),2)}:${fill(date.getMilliseconds(),3)}`
                        dateText.innerHTML = date + " // " + date2;

                        const angleHeures = 360*((date.getHours() % 12)+date.getMinutes()/60)/12 - 90
                        const angleMinutes = 360*(date.getMinutes()+date.getSeconds()/60)/60 - 90 - angleHeures
                        const angleSecondes = 360*(date.getSeconds()+date.getMilliseconds()/1000)/60 - 90 - angleHeures - angleMinutes
                        const angleMs = 360*(date.getSeconds()+date.getMilliseconds()/1000) - 90 - angleHeures - angleMinutes - angleSecondes

                        heures.style.transform = `rotate(${angleHeures}deg)`
                        minutes.style.transform = `rotate(${angleMinutes}deg)`
                        secondes.style.transform = `rotate(${angleSecondes}deg)`
                        millisecondes.style.transform = `rotate(${angleMs}deg)`

                        function sinD (angle) {
                            return Math.sin(angle * (Math.PI / 180));
                        }
                        
                        let pm = heuresW*sinD(-angleHeures) + minutesW*sinD(-(angleMinutes+angleHeures))
                        horlogeHaut.style.height = `${smsW+pm}px`
                        horlogeBas.style.height = `${smsW-pm}px`

                    };
                    
                    setInterval(dateLoop, 20);
                </script>

            <script>
            
                ///////////// fait boucler le titre
                function setCharAt(str,index,chr) {
                    if(index > str.length-1) return str;
                    return str.substring(0,index) + chr + str.substring(index+1);
                }

                const title = "le labo"
                let kw = 0;

                function rewriteLoop(){
                    // entre 33 et 591 = jusqu'à Latin Extended-B
                    // https://en.wikipedia.org/wiki/List_of_Unicode_characters#Latin_script
                    let char = String.fromCharCode(33 + Math.floor((592-33)*Math.random()))
                    let title2 = setCharAt(title, kw % title.length, char)
                    document.title = "jej - " + title2;
                    document.getElementsByClassName("lien-titre")[0].childNodes[1].innerHTML = title2
                    // console.log(document.title)
                    kw+=1;
                };
                    
                setInterval(rewriteLoop, 100);

                function listChars(n){
                    for (let i=33; i<=n; i++){
                        console.log(`${i} - ${String.fromCharCode(i)}`)
                    }
                }
                //listChars(591);
                // "£".charCodeAt(0)

                ///////////// fait boucler la couleur

                let tc = 0;
                const r0 = 253, g0 = 234, b0 = 182; // couleurs initiales
                const w = 0.2, A = 15;
                const ph_r = 2*Math.PI*Math.random(); ph_g = 2*Math.PI*Math.random(); ph_b = 2*Math.PI*Math.random();

                function recolorLoop(){
                    let r = r0 + A*Math.cos(w*tc+ph_r);
                    let g = g0 + A*Math.cos(w*tc+ph_g);
                    let b = b0 + A*Math.cos(w*tc+ph_b);
                    
                    document.body.style.setProperty("--background-color", `rgb(${r}, ${g}, ${b})`)
                    // console.log(`rgb(${r}, ${g}, ${b})`)
                    tc+=1;
                };

                const btnColor = document.getElementById("btn-color")
                // btnColor.checked = true // on initialise à coché
                var recolorID;

                btnColor.addEventListener("change", (event) => {
                    if (btnColor.checked){
                        recolorID = setInterval(recolorLoop, 40);
                    } else {
                        clearInterval(recolorID);
                        document.body.style.setProperty("--background-color", `rgb(${r0}, ${g0}, ${b0})`)
                    }
                })
                btnColor.dispatchEvent(new Event("change"))

                ///////////// fait boucler le curseur

                const cursors = ["alias", "all-scroll", "auto", "cell", "col-resize", "context-menu", "copy", "crosshair", "default", "e-resize", "ew-resize", "grab", "grabbing", "help", "move", "n-resize", "ne-resize", "nesw-resize", "ns-resize", "nw-resize", "nwse-resize", "no-drop", "none", "not-allowed", "pointer", "progress", "row-resize", "s-resize", "se-resize", "sw-resize", "text", "url", "w-resize", "wait", "zoom-in", "zoom-out", `url("img/jej32.png"), auto`]

                function cursorLoop(){
                    document.body.style.cursor = cursors[Math.floor(Math.random() * cursors.length)];
                }

                const btnCursor = document.getElementById("btn-cursor")
                // btnCursor.checked = true // on initialise à coché
                var cursorID;

                btnCursor.addEventListener("change", (event) => {
                    if (btnCursor.checked){
                        cursorID = setInterval(cursorLoop, 200);
                    } else {
                        clearInterval(cursorID);
                        document.body.style.cursor = "";
                    }
                })
                btnCursor.dispatchEvent(new Event("change"))

            </script>
