                <!-- https://thaer.no/calendar -->
                <div id="dateText" style="text-align: center; font-weight: bold;"></div>
                <br><br><br><br><br><br><br>
                <div style="text-align: center; font-size: x-large; font-weight: bolder;">
                    <span id="heures" style="display: inline-block; transform-origin: left;">--h--></span><br>
                    <span id="minutes" style="display: inline-block; transform-origin: left;">---m---></span><br>
                    <span id="secondes" style="display: inline-block; transform-origin: left;">----s----></span><br>
                    <span id="millisecondes" style="display: inline-block; transform-origin: left;">-----ms-----></span><br>
                    <!-- <span style="display: inline-block; transform: translate(-1em, -5.6em) scale(20);color: gray;font-weight: normal;">○</span> -->
                </div>

                <script>
                    const dateText = document.getElementById("dateText")
                    const semaine = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche']
                    const heures = document.getElementById("heures")
                    const minutes = document.getElementById("minutes")
                    const secondes = document.getElementById("secondes")
                    const millisecondes = document.getElementById("millisecondes")
                    
                    function fill(str, n){
                        return '0'.repeat(n-str.toString().length) + str
                    }

                    function dateLoop(){
                        let date = new Date();
                        let date2 = `${semaine[date.getDay()]} ${fill(date.getDate(),2)}/${fill(date.getMonth(),2)}/${date.getFullYear()}, ${fill(date.getHours(),2)}:${fill(date.getMinutes(),2)}:${fill(date.getSeconds(),2)}:${fill(date.getMilliseconds(),3)}`
                        dateText.innerHTML = date + " // " + date2;

                        heures.style.transform = `translate(0, 0) rotate(${360*(date.getHours()+date.getMinutes()/60)/12 - 90}deg)`

                        minutes.style.transform = `translate(0.7em, -1.2em) rotate(${360*(date.getMinutes()+date.getSeconds()/60)/60 - 90}deg)`

                        secondes.style.transform = `translate(0.7em, -2.4em) rotate(${360*(date.getSeconds()+date.getMilliseconds()/1000)/60 - 90}deg)`

                        millisecondes.style.transform = `translate(1.5em, -3.5em) rotate(${360*(date.getSeconds()+date.getMilliseconds()/1000) - 90}deg)`
                    };
                    
                    setInterval(dateLoop, 20);
                </script>

            <section id="chien-basse">
                <style>
                    #chien-basse > div {

                        margin: auto;
                    }
                </style>
                <div id="bienvenue-cb"></div>
                <br>
                <div id="compteur-cb"></div>                
                <div id="terrain-cb"></div>

                <script>

                    const bienvenueCB = document.getElementById("bienvenue-cb")
                    const compteurCB = document.getElementById("compteur-cb")
                    const terrainCB = document.getElementById("terrain-cb")
                    let L; // nombre de mètres : 20 50 100 ?
                    const vitesse = 0.5;
                    let metres; // distance parcourue
                    let started = false; // on peut avancer ou non
                    let running = false; // on court là ou non
                    let prevkey; // touche précédente : gauche, droite, autre
                    let tempsDepart; // temps de départ à soustraire pour la durée de course
                    var compteurID; // boucle de setInterval clearInterval
                    
                    const buttonsCB = document.createElement("span");
                    [20, 50, 100].forEach((n) => buttonsCB.appendChild(newButton(n)))

                    function newButton(val){
                        let button = document.createElement("button");
                        button.innerText = `${val} mètres`
                        button.addEventListener('click', () => { // 2b - bouton qui peut lancer la course
                            L = val;
                            started = true;
                            metres = 0;
                            compteurCB.innerHTML = "À vos marques...";
                            bienvenueCB.innerHTML = `Bienvenue à la course de chien-basse sur ${L} mètres !<br>Avancez sur la route en alternant les touches ← →`
                            terrainCB.innerHTML = afficheTerrain(Math.floor(metres))
                        })
                        return button
                    }

                    function afficheTerrain(k){
                        if (k > 0 & k < L) {
                            return "📍" + ".".repeat(k-1) + ";" + ".".repeat(L-k-1) + "📍"
                        } else {
                            return "📍" + ".".repeat(L-1) + "📍"
                        }
                    }

                    function formatDuree(t){ // au format " 1.02s"
                        let secs = Math.floor(t/1000);
                        let cents = Math.floor((t - secs*1000)/10).toString();
                        return " ".repeat(Math.max(0, 2-secs.toString().length))
                                + secs
                                + "."
                                + "0".repeat(Math.max(0, 2-cents.length))
                                + cents
                                + "s";
                    }

                    function formatDistance(d){ // au format " 1.0 mètres"
                            let mets = Math.floor(d).toString();
                            return " ".repeat(Math.max(0, 2-mets.length))
                                    + mets
                                    + " mètres";
                    }

                    function afficheCompteur(){
                        compteurCB.innerHTML = formatDistance(metres) + " - " + formatDuree((new Date().getTime()) - depart)
                    }

                    // 1a - état initial
                    bienvenueCB.innerHTML = "Bienvenue à la course de chien-basse !<br>Quelle distance ? ";      
                    bienvenueCB.appendChild(buttonsCB)
                    compteurCB.innerHTML = "<br>";
                    terrainCB.innerHTML = "📍📍";

                    window.addEventListener('keydown', () => { // 2 - avancement de course
                        if (started) {
                            if (!running) {
                                if (event.key == "ArrowLeft" | event.key == "ArrowRight"){
                                    depart = new Date().getTime();
                                    compteurID = setInterval(afficheCompteur, 50)
                                    running = true; // si on mettait "if (metres == 0)" il le lancerait deux fois bref
                                }
                            }
                            if (metres < L) {
                                if ((event.key == "ArrowLeft" & prevkey == "ArrowRight") | (event.key == "ArrowRight" & prevkey == "ArrowLeft")){
                                    metres += vitesse;
                                }
                                if (event.key == "ArrowLeft" | event.key == "ArrowRight"){
                                    terrainCB.innerHTML = afficheTerrain(Math.floor(metres))
                                }
                                prevkey = event.key
                            }
                            if (metres >= L) { // 3 - on vient de terminer, on est à metres = L
                                clearInterval(compteurID);
                                compteurCB.innerHTML = `Course de ${L} mètres finie en <strong style="color:red">${Math.floor(((new Date().getTime()) - depart)/10)/100}</strong> secondes :)`
                                terrainCB.innerHTML = afficheTerrain(Math.floor(metres))
                                bienvenueCB.innerHTML = "Relancer une course de chien-basse ?<br>Quelle distance ? ";      
                                bienvenueCB.appendChild(buttonsCB)
                                started = false; // désactive l'event listener
                                running = false; // désactive la boucle d'affichage
                            }
                        }
                    });
                    // TODO: un graphique de la vitesse à la fin
                    // bizarre mon bot est 2-3x plus rapide sans l'activation des couleurs... mais à la main aucune diff
                </script>

            <script> // fait boucler le titre et la couleur
                function setCharAt(str,index,chr) {
                    if(index > str.length-1) return str;
                    return str.substring(0,index) + chr + str.substring(index+1);
                }

                const title = "le labo"
                let kw = 0;

                function rewriteLoop(){
                    // entre 33 et 591 = jusqu'à Latin Extended-B
                    // https://en.wikipedia.org/wiki/List_of_Unicode_characters#Latin_script
                    let char = String.fromCharCode(33 + Math.floor((592-33)*Math.random()))
                    let title2 = setCharAt(title, kw % title.length, char)
                    document.title = "jej - " + title2;
                    document.getElementsByClassName("lien-titre")[0].childNodes[1].innerHTML = title2
                    // console.log(document.title)
                    kw+=1;
                };
                    
                setInterval(rewriteLoop, 100);

                function listChars(n){
                    for (let i=33; i<=n; i++){
                        console.log(`${i} - ${String.fromCharCode(i)}`)
                    }
                }
                //listChars(591);
                // "£".charCodeAt(0)

                let tc = 0;
                const r0 = 253, g0 = 234, b0 = 182; // couleurs initiales
                const w = 0.2, A = 15;
                const ph_r = 2*Math.PI*Math.random(); ph_g = 2*Math.PI*Math.random(); ph_b = 2*Math.PI*Math.random();
                function recolorLoop(){
                    let r = r0 + A*Math.cos(w*tc+ph_r);
                    let g = g0 + A*Math.cos(w*tc+ph_g);
                    let b = b0 + A*Math.cos(w*tc+ph_b);
                    
                    document.body.style.setProperty("--background-color", `rgb(${r}, ${g}, ${b})`)
                    // console.log(`rgb(${r}, ${g}, ${b})`)
                    tc+=1;
                };

                const btnColor = document.getElementById("btn-color")
                btnColor.checked = true // on initialise à coché
                btnColor.dispatchEvent(new Event("change"))
                var recolorID = setInterval(recolorLoop, 20);

                btnColor.addEventListener("change", (event) => {
                    if (btnColor.checked){
                        recolorID = setInterval(recolorLoop, 20);
                    } else {
                        clearInterval(recolorID);
                        document.body.style.setProperty("--background-color", `rgb(${r0}, ${g0}, ${b0})`)
                    }
                })
            </script>
