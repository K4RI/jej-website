<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <title>jej - photos de profil</title>
        <link rel="icon" type="image/x-icon" href="../img/jej.png">
        <link href="../css/style.css" rel="stylesheet">
        <link href="../css/slider.css" rel="stylesheet">
        <script src="../scripts/js/slider.js" defer></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900&display=swap" rel="stylesheet">

    </head>
    <body>
        <a style="font-size: 0.9em"; href="../index.html"> < retour à l'accueil</a>
        <nav id="navbar"></nav>

        <header>
            <a class="lien-titre" href="#">
                <h1>Photos de profil</h1>
            </a>
        </header>

        <main>

        <p>aux occasions de divers événements de l'école j'avais progressivement altéré mon image de profil sur facebook</p>
        <p>et à y repenser c'était plutôt chouette donc les voici</p>

        <div class="slider">
            <!-- https://dev.to/huericnan/creating-an-image-slider-with-html-css-and-javascript-4jl6 -->
            <div class="slide">
                <figure class="figslider">
                    <img src="../img/pdp/original.jpg" title="original"/>
                    <figcaption>original - 11 avril 2017</figcaption>
                </figure>
            </div>
         
            <div class="slide">
                <figure class="figslider">
                    <img src="../img/pdp/bda1.png" title="campagne bda 1"/>
                    <figcaption>pour une campagne - 20 mai 2020</figcaption>
                </figure>
            </div>
         
            <div class="slide">
                <figure class="figslider">
                    <img src="../img/pdp/bda2.png" title="campagne bda 2"/>
                    <figcaption>idem - 21 mai 2020</figcaption>
                </figure>
            </div>         
            
            <div class="slide">
                <figure class="figslider">
                    <img src="../img/pdp/bda3.jpg" title="campagne bda 3"/>
                    <figcaption>idem - 22 mai 2020</figcaption>
                </figure>
            </div>
         
            <div class="slide">
                <figure class="figslider">
                    <img src="../img/pdp/inté1.jpg" title="inté 1"/>
                    <figcaption>pour la rentrée - 6 septembre 2020</figcaption>
                </figure>
            </div>
         
            <div class="slide">
                <figure class="figslider">
                    <img src="../img/pdp/inté2.jpg" title="inté 2"/>
                    <figcaption>pour la rentrée bis - 6 septembre 2020</figcaption>
                </figure>
            </div>
         
            <div class="slide">
                <figure class="figslider">
                    <img src="../img/pdp/jej.jpg" title="jej"/>
                    <figcaption>pour la fin de l'école - 2 octobre 2022</figcaption>
                </figure>
            </div>

            <a class="prev" onclick="prevSlide()">&lt;</a>
            <a class="next" onclick="nextSlide()">&gt;</a>
        </div>

        </main>

        <footer id="footer">
            <script type="text/javascript" src="../scripts/js/headerFooter.js"></script>
        </footer>

    </body>
</html>
